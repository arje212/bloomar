<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>{% block title %}BloomAR{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --pink:#FF5C8A;--pink-light:#FF8FA3;--gold:#FFD166;
  --mint:#06D6A0;--purple:#8338EC;--dark:#0D0407;
  --dark2:#1A0A12;--dark3:#2D0A1E;
  --glass:rgba(255,255,255,0.06);--glass-border:rgba(255,255,255,0.09);
}
html,body{width:100%;height:100%;background:var(--dark);color:#fff;font-family:'DM Sans',sans-serif;overflow-x:hidden}
a{text-decoration:none;color:inherit}

/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,92,138,0.3);border-radius:4px}

/* Shared components */
.btn-primary{
  display:inline-flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,var(--pink),var(--pink-light));
  color:#fff;font-weight:700;font-size:15px;
  padding:14px 28px;border-radius:16px;border:none;cursor:pointer;
  box-shadow:0 8px 24px rgba(255,92,138,0.35);
  transition:transform .15s,box-shadow .15s;
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(255,92,138,0.45)}
.btn-primary:active{transform:scale(.97)}
.btn-ghost{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--glass);border:1px solid var(--glass-border);
  color:rgba(255,255,255,.7);font-weight:600;font-size:14px;
  padding:10px 18px;border-radius:12px;cursor:pointer;
  transition:background .15s,border-color .15s;
}
.btn-ghost:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.18)}

/* Page transition */
.page-enter{animation:pageIn .4s ease forwards}
@keyframes pageIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* Nav */
.top-nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;
  background:linear-gradient(to bottom,rgba(13,4,7,.9),transparent);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.nav-back{
  width:40px;height:40px;border-radius:50%;
  background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background .15s;
}
.nav-back:hover{background:rgba(255,255,255,.1)}
.nav-back svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.nav-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700}
.nav-logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:800;
  background:linear-gradient(135deg,#fff,var(--pink-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
</style>
{% block extra_head %}{% endblock %}
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
